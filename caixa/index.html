    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background:
        radial-gradient(ellipse at top, rgba(255,255,255,0.3) 0%, transparent 50%),

    .chocolate-box {
      position: relative;

      cursor: pointer;
      margin-top: -10px;
    }

    .chocolate-box:before, .chocolate-box:after {
      content:"";
      position: absolute;
    }

    .chocolate-box:before {
      width: 256px;
      height: 256px;

      position: absolute;
      z-index:1;
      inset: 0;
    }

    .top-left {
      top:147px;
      left:144px;
    }

    .top-left:hover {
      transform: rotate(25deg);
    }

    .top-left:active {
      opacity:0;
    }

    .bottom-right {
      left:259px;
      top: 259px;
    }

    .bottom-right:hover {
      transform: rotate(25deg);
    }

    .bottom-right:active {
      opacity:0;
    }

    .top-left, .bottom-right {

      height: 48px;

      height: 48px;
      background-color: #d12511;

      left:16px;
    }

    .top-left:after, .bottom-right:after {

      height: 16px;

    .top-right {
      position: absolute;
      border-radius: 50%;

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      height: 72px;
      top:147px;

    }

    .top-right:before, .top-right:after {
      content:"";
      position: absolute;
      background-color: #93522b;
      width:160px;
      height: 5px;

    }

    .top-right:before {
      top:24px;
      transform: rotate(-35deg);

    }

    .top-right:after {
      top:0;
      transform: rotate(-15deg);
      box-shadow: 0 27px #93522b, 0 48px #93522b;
    }

    .bottom-left:hover {
      transform: rotate(25deg);
    }

    .bottom-left:active {
      opacity:0;
    }

    .top-right:hover {
      transform: rotate(25deg);
    }

    .top-right:active {
      opacity:0;
    }

    .bottom-left {

      border-radius: 50%;
      background-color: #503520;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      width:72px;

      transition: .2s;
    }

    .bottom-left:before, .bottom-left:after {
      content:"";
      position: absolute;
      background-color: #fde7c7;

    }

    .bottom-left:after {

      position: relative;
      border: 3px solid #ff6b6b;
    }

    .love-message::before {
      content: "";
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);

      height: 30px;
      background: linear-gradient(145deg, #c41e3a, #a01530);
      border: 3px solid #ff6b6b;
      border-bottom: none;
      border-radius: 30px 30px 0 0;
    }

    .love-message::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 15px;
      height: 15px;
      background: #8b0000;
      border-right: 3px solid #ff6b6b;
      border-bottom: 3px solid #ff6b6b;
    }

    @keyframes floatIn {
      0% {
        transform: scale(0.5) translateY(50px);
        opacity: 0;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .love-message h2 {
      color: #fff;
      font-family: "Great Vibes", cursive;
      font-size: 48px;
      margin: 10px 0 10px 0;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
    }

    .love-message p {
      color: #ffe4e1;
      font-family: "Playfair Display", Georgia, serif;
      font-size: 18px;
      font-style: italic;

      padding: 0 10px;

    .close-btn {

    .decor-left, .decor-right {
      position: absolute;

    .decor-left {

    }

    .decor-right {

    @media (max-width: 600px) {

    @media (max-width: 400px) {

      }

    .text-white {

    .back-example-btn {

    .music-control {
      position: fixed;

    .music-btn {
      width: 50px;

      align-items: center;

    .music-btn:hover {

    .music-btn:active {

    .music-btn svg {

    .volume-control {

    .volume-control input::-webkit-slider-thumb {

    .nexkai-credit {

<body>

  <button id="toggle-fullscreen" class="text-white btn-fullscreen-toggle" style="position: absolute; top: 15px; left: 15px; z-index: 999;">

    </button>
  <h1 class="main-title" id="mainTitle">Para você, meu amor</h1>
    <div class="music-control">

      </svg>

  </audio>
      <div class="chocolate-box">
    <div class="chocs">
      <div id="top-left" class="top-left"></div>
      <div id="top-right" class="top-right"></div>
      <div id="bottom-left" class="bottom-left"></div>
      <div id="bottom-right" class="bottom-right"></div>
    </div>
    <div class="box-bottom"></div>
    <div class="cover" id="boxCover" data-cover-text="Clique aqui"></div>

    <div id="label-top-right" class="choco-label" style="display: none; white-space: normal; overflow-wrap: break-word; max-width: 180px; left: 360px;">Chocolate branco</div>

  <div id="loveModal" class="love-modal">
    <div class="love-message">
      <div class="decor-left"></div>
      <div class="decor-right"></div>
      <h2 id="modalTitle">Você é minha doçura</h2>
      <p id="modalText">Cada momento com você é tão doce quanto este chocolate. Eu te amo com todo o meu coração.</p>
      <button class="close-btn" onclick="closeModal()">Fechar</button>

  <script>
    const defaultGiftData = {
      mainTitle: "Para você, meu amor",
      coverText: "Clique aqui",
      music: "musica/James Arthur - Say You Won't Let Go.mp3",
      chocolates: [{"name":"Trufa de chocolate","title":"Você é minha doçura","message":"Cada momento com você é tão doce quanto este chocolate. Eu te amo com todo o meu coração."},{"name":"Chocolate branco","title":"Meu amor puro","message":"Assim como o chocolate branco, meu amor por você é puro e sincero. Você é a melhor coisa da minha vida."},{"name":"Chocolate ao leite","title":"Juntos para sempre","message":"Assim como o chocolate ao leite, nós somos a combinação perfeita. Tudo fica melhor com você."},{"name":"Trufa especial","title":"Você é especial","message":"Tão especial quanto uma trufa, é assim que você é para mim. Agradeço por existir na minha vida."}]
    };

    const isExampleMode = location.hash.startsWith("#example");
    const isGeneratedGift = location.hash.startsWith("#gift");
    const builderUrl = "../index.html#personalizar";

    if (isExampleMode && sessionStorage.getItem("exampleReturnedToBuilder") === "1") {
      location.replace(builderUrl);
    }

    if (isExampleMode) {
      document.getElementById("backExampleBtn")?.classList.remove("hidden");
    }

    if (isGeneratedGift) {
      document.getElementById("nexkaiCredit")?.classList.add("hidden");
    }

    function blockBrowserNavigation() {
      history.replaceState({ locked: true }, "", location.href);
      history.pushState({ locked: true }, "", location.href);
      window.addEventListener("popstate", () => {
        history.pushState({ locked: true }, "", location.href);
      });
    }

    document.getElementById("backExampleBtn")?.addEventListener("click", () => {

    function decodeDataPayload(value) {
      if (!value) return null;

      try {
        const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
        const binary = atob(padded);
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        return JSON.parse(new TextDecoder().decode(bytes));
      } catch {
        return null;
      }
    }

    function safeDecode(value) {
      try {
        return decodeURIComponent(value || "");
      } catch {
        return value || "";
      }
    }

    function getIncomingParams() {
      if (location.hash.startsWith("#gift?")) {
        return new URLSearchParams(location.hash.replace("#gift?", ""));
      }
      if (location.hash.startsWith("#example?")) {
        return new URLSearchParams(location.hash.replace("#example?", ""));
      }
      return new URLSearchParams(location.search);
    }

    function normalizeGiftData(rawData) {
      const incoming = rawData || {};
      const hasIncomingMusic = Object.prototype.hasOwnProperty.call(incoming, "music");
      const chocolates = defaultGiftData.chocolates.map((fallback, index) => {
        const next = incoming.chocolates?.[index] || {};
        return {
          name: next.name || fallback.name,
          title: next.title || fallback.title,
          message: next.message || fallback.message
        };
      });

      return {
        mainTitle: incoming.mainTitle || incoming.title || defaultGiftData.mainTitle,
        coverText: incoming.coverText || defaultGiftData.coverText,
        music: hasIncomingMusic ? incoming.music : defaultGiftData.music,
        chocolates
      };
    }

    function readGiftDataFromUrl() {
      const params = getIncomingParams();
      const payload = decodeDataPayload(params.get("d") || "");
      if (payload) return normalizeGiftData(payload);

      const legacyChocolates = defaultGiftData.chocolates.map((fallback, index) => ({
        name: safeDecode(params.get(`choco${index + 1}Name`)) || fallback.name,
        title: safeDecode(params.get(`choco${index + 1}Title`)) || fallback.title,
        message: safeDecode(params.get(`choco${index + 1}Message`)) || fallback.message
      }));

      return normalizeGiftData({
        mainTitle: safeDecode(params.get("mainTitle")) || safeDecode(params.get("title")),
        coverText: safeDecode(params.get("coverText")),
        music: safeDecode(params.get("music")),
        chocolates: legacyChocolates
      });
    }

    const giftData = readGiftDataFromUrl();
    const chocolatesData = giftData.chocolates;

    document.title = "Presente digital";
    document.getElementById("mainTitle").textContent = giftData.mainTitle;
    document.getElementById("boxCover").setAttribute("data-cover-text", giftData.coverText);
    document.getElementById("backgroundMusicSource").src = giftData.music || "";
    document.getElementById("backgroundMusic").toggleAttribute("data-has-music", Boolean(giftData.music));
    $("#label-top-left").text(chocolatesData[0].name);
    $("#label-top-right").text(chocolatesData[1].name);
    $("#label-bottom-left").text(chocolatesData[2].name);
    $("#label-bottom-right").text(chocolatesData[3].name);

    const positionMap = {
      'top-left': 0,
      'top-right': 1,
      'bottom-left': 2,
      'bottom-right': 3
    };

    function showLoveMessage(chocolateId) {
      const index = positionMap[chocolateId];
      const choco = chocolatesData[index];

      if (choco) {
        $('#modalTitle').text(choco.title || 'Eu te amo');
        const message = (choco.message || 'Você é a melhor coisa da minha vida.')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>');
        $('#modalText').html(message);

        $('#loveModal').addClass('active');
      }
    }

    function closeModal() {
      $('#loveModal').removeClass('active');
    }

    $('#loveModal').on('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    $(document).ready(function(){
      function adjustLabelPosition(label) {
        const originalLeft = window.getComputedStyle(label).left;

        label.style.display = 'block';
        label.style.whiteSpace = 'normal';
        label.style.overflowWrap = 'break-word';
        label.style.maxWidth = '180px';

        let labelRect = label.getBoundingClientRect();
        let currentLeft = parseFloat(window.getComputedStyle(label).left);
        let newLeft = currentLeft;

        if (labelRect.left < 0) {
          newLeft -= labelRect.left - 10;
        }

        if (labelRect.right > window.innerWidth) {
          newLeft -= (labelRect.right - window.innerWidth + 10);
        }

        label.style.left = newLeft + 'px';

        return {originalLeft};
      }

      function restoreLabelPosition(label, originals) {
        label.style.left = originals.originalLeft;
        label.style.whiteSpace = originals.originalWhiteSpace;
        label.style.overflowWrap = originals.originalOverflowWrap;
        label.style.maxWidth = originals.originalMaxWidth;
        label.style.display = 'none';
      }

      $("#top-right").on('mouseenter', function() {
        const label = $("#label-top-right")[0];
        this.originals = adjustLabelPosition(label);
      }).on('mouseout', function() {
        const label = $("#label-top-right")[0];
        restoreLabelPosition(label, this.originals);
      });

      $("#bottom-left").on('mouseenter', function() {
        const label = $("#label-bottom-left")[0];
        this.originals = adjustLabelPosition(label);
      }).on('mouseout', function() {
        const label = $("#label-bottom-left")[0];
        restoreLabelPosition(label, this.originals);
      });

      $("#bottom-right").on('mouseenter', function() {
        const label = $("#label-bottom-right")[0];
        this.originals = adjustLabelPosition(label);
      }).on('mouseout', function() {
        const label = $("#label-bottom-right")[0];
        restoreLabelPosition(label, this.originals);
      });

      $("#top-left").on('mouseenter', function() {
        const label = $("#label-top-left")[0];
        this.originals = adjustLabelPosition(label);
      }).on('mouseout', function() {
        const label = $("#label-top-left")[0];
        restoreLabelPosition(label, this.originals);
      });

      $("#top-left").on('click', function() {

      $("#top-right").on('click', function() {

      $("#bottom-left").on('click', function() {

      });
      $("#bottom-right").on('click', function() {
        showLoveMessage('bottom-right');
      });
    });

        document.addEventListener('DOMContentLoaded', () => {
            const fullscreenManager = {
                toggleBtn: document.getElementById('toggle-fullscreen'),
                iconElement: document.getElementById('fullscreen-icon'),
                isFullscreen: function() {
                    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
                },
                updateIcon: function() {
                    if (!this.iconElement) return;
                    if (this.isFullscreen()) {
                        this.iconElement.classList.remove('fa-expand');
                        this.iconElement.classList.add('fa-compress');
                    } else {
                        this.iconElement.classList.remove('fa-compress');
                        this.iconElement.classList.add('fa-expand');
                    }
                },
                toggle: function() {
                    if (!this.isFullscreen()) {
                        const element = document.documentElement;
                        if (element.requestFullscreen) {
                            element.requestFullscreen();
                        } else if (element.mozRequestFullScreen) {
                            element.mozRequestFullScreen();
                        } else if (element.webkitRequestFullscreen) {
                            element.webkitRequestFullscreen();
                        } else if (element.msRequestFullscreen) {
                            element.msRequestFullscreen();
                        }
                    } else {
                        if (document.exitFullscreen) {
                            document.exitFullscreen();
                        } else if (document.mozCancelFullScreen) {
                            document.mozCancelFullScreen();
                        } else if (document.webkitExitFullscreen) {
                            document.webkitExitFullscreen();
                        } else if (document.msExitFullscreen) {
                            document.msExitFullscreen();
                        }
                    }
                },
                init: function() {
                    if (this.toggleBtn) {
                        this.toggleBtn.addEventListener('click', () => this.toggle());
                        document.addEventListener('fullscreenchange', () => this.updateIcon());
                        document.addEventListener('webkitfullscreenchange', () => this.updateIcon());
                        document.addEventListener('mozfullscreenchange', () => this.updateIcon());
                        document.addEventListener('MSFullscreenChange', () => this.updateIcon());
                    }
                }
            };
            fullscreenManager.init();
        });
                function setupMusicControls() {
      const music = document.getElementById("backgroundMusic");
      const musicBtn = document.getElementById("musicBtn");
      const playIcon = document.getElementById("playIcon");
      const pauseIcon = document.getElementById("pauseIcon");
      const volumeSlider = document.getElementById("volumeSlider");
      const volumeControl = document.getElementById("volumeControl");

      if (!music || !musicBtn || !volumeSlider || !volumeControl) {
        console.error('Música ou elementos de controle não encontrados');
        return;
      }

      if (!music.hasAttribute('data-has-music')) {
        document.querySelector('.music-control')?.classList.add('hidden');
        return;
      }

      music.volume = volumeSlider.value;

      music.load();
      music.currentTime = 0;
      music.play().then(() => {
        console.log('Reprodução automática iniciada em:', music.currentTime);
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      }).catch(error => {
        console.warn('Reprodução automática bloqueada:', error.message);
      });

      function toggleMusic() {
        if (music.paused) {
          music.play().then(() => {
            console.log('Música tocando em:', music.currentTime);
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
          }).catch(error => {
            console.error('Erro ao reproduzir áudio:', error.message);
          });
        } else {
          music.pause();
          console.log('Música pausada em:', music.currentTime);
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
        }
      }

      musicBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMusic();
        if (!volumeControl.classList.contains('visible')) {
          volumeControl.classList.add('visible');
          clearTimeout(hideVolumeTimeout);
          hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
        } else {
          volumeControl.classList.remove('visible');
        }
      });

      let hideVolumeTimeout = null;
      volumeSlider.addEventListener('input', (e) => {
        music.volume = e.target.value;
        console.log('Volume definido para:', music.volume);
        clearTimeout(hideVolumeTimeout);
        volumeControl.classList.add('visible');
      });

      volumeSlider.addEventListener('change', () => {
        hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
      });

      volumeControl.addEventListener('mouseenter', () => clearTimeout(hideVolumeTimeout));
      volumeControl.addEventListener('mouseleave', () => {
        hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
      });

      volumeSlider.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        clearTimeout(hideVolumeTimeout);
      });
      volumeSlider.addEventListener('touchend', () => {
        hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
      });

      document.addEventListener('click', (e) => {
        if (!volumeControl.contains(e.target) && !musicBtn.contains(e.target)) {
          volumeControl.classList.remove('visible');
          clearTimeout(hideVolumeTimeout);
        }
      });

      music.addEventListener('loadeddata', () => console.log('Dados do áudio carregados'));
      music.addEventListener('error', (e) => console.error('Erro de áudio:', e.message));
      music.addEventListener('play', () => console.log('Evento de reprodução da música'));
      music.addEventListener('pause', () => console.log('Evento de pausa da música'));
    }

    setupMusicControls();
          </script>
